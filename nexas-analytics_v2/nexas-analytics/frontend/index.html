<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXAS Analytics</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<header class="header">
    <h1>NEXAS ANALYTICS</h1>
    <div class="header-right">
        <select id="onda-select"><option value="">Carregando ondas...</option></select>
        <button id="theme-toggle">
            <span id="toggle-icon">☀️</span>
            <span style="font-size:11px;letter-spacing:.5px">TEMA</span>
        </button>
    </div>
</header>

<div class="contexto" id="contexto">
    Selecione uma onda e um cruzamento para iniciar a análise.
</div>

<div class="filtros">
    <select id="assunto-select" disabled><option value="">Assunto</option></select>
    <select id="pergunta-select" disabled><option value="">Pergunta / Indicador</option></select>
    <select id="direcao-select">
        <option value="">Todas as direções</option>
        <option value="DRIVER">Só Drivers</option>
        <option value="ANTI-DRIVER">Só Anti-drivers</option>
    </select>
</div>

<div class="viz-wrapper">
    <div class="viz-toolbar">
        <div class="toolbar-group">
            <span class="toolbar-label">Zoom</span>
            <button class="zoom-btn" id="btn-zoom-in">＋</button>
            <span class="zoom-pct" id="zoom-pct">100%</span>
            <button class="zoom-btn" id="btn-zoom-out">－</button>
            <button class="zoom-btn btn-sm" id="btn-zoom-fit" style="width:auto;padding:0 8px">Fit</button>
        </div>
        <div class="toolbar-group">
            <span class="toolbar-label">Espaço Y</span>
            <input type="range" id="slider-y" min="14" max="64" value="26" step="2">
            <span class="slider-val" id="val-y">26</span>
        </div>
        <div class="toolbar-group">
            <span class="toolbar-label">Espaço X</span>
            <input type="range" id="slider-x" min="120" max="400" value="220" step="10">
            <span class="slider-val" id="val-x">220</span>
        </div>
        <div class="toolbar-group">
            <span class="toolbar-label">Buscar</span>
            <input type="text" class="search-box" id="search-box" placeholder="🔍 texto...">
            <button class="btn-sm" id="btn-clear-search">✕</button>
        </div>
        <div class="toolbar-group">
            <button class="btn-sm" id="btn-expand">+ Expandir tudo</button>
            <button class="btn-sm" id="btn-collapse">− Colapsar tudo</button>
        </div>
        <div class="legenda">
            <div class="legenda-item"><div class="legenda-dot" style="background:var(--driver-forte)"></div>Driver forte</div>
            <div class="legenda-item"><div class="legenda-dot" style="background:var(--driver-rel)"></div>Relevante</div>
            <div class="legenda-item"><div class="legenda-dot" style="background:var(--driver-mod)"></div>Moderado</div>
            <div class="legenda-item"><div class="legenda-dot" style="background:var(--anti-driver)"></div>Anti-driver</div>
            <div class="legenda-item"><div class="legenda-dot" style="background:var(--baixa)"></div>Baixa rel.</div>
        </div>
    </div>
    <div class="viz-svg-container" id="svg-container">
        <div class="viz-placeholder">Dendrograma aparecerá aqui após selecionar o cruzamento</div>
    </div>
</div>

<div class="metricas">
    <div class="metrica-item"><div class="valor" id="met-total">—</div><div class="label">Cruzamentos</div></div>
    <div class="metrica-item"><div class="valor cor-driver" id="met-drivers">—</div><div class="label">Drivers</div></div>
    <div class="metrica-item"><div class="valor cor-anti" id="met-anti">—</div><div class="label">Anti-drivers</div></div>
    <div class="metrica-item"><div class="valor" id="met-score">—</div><div class="label">Top Score</div></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const API = '/api';

// ── Layout state (lido pelos sliders) ──────────────────────────
const layout = { spacingY: 26, spacingX: 220 };

// ── Referências D3 globais ──────────────────────────────────────
let svgEl = null, gTree = null, zoomBeh = null;
let rootNode = null, doUpdate = null, currentTreemap = null;
let nodeIdSeq = 0;

const DURATION = 350;
const MARGIN   = { top: 28, right: 280, bottom: 28, left: 56 };

// ════════════════════════════════════════════════════════════════
// TEMA
// ════════════════════════════════════════════════════════════════
function initTheme() {
    applyTheme(localStorage.getItem('nx-theme') || 'dark');
    document.getElementById('theme-toggle').addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('nx-theme', next);
        if (doUpdate && rootNode) doUpdate(rootNode);
    });
}
function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    document.getElementById('toggle-icon').textContent = t === 'dark' ? '☀️' : '🌙';
}
function cssVar(v) {
    return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}

// ════════════════════════════════════════════════════════════════
// CONTROLES — registrados UMA ÚNICA VEZ em initControls()
// Nunca chamado dentro de renderTree()
// ════════════════════════════════════════════════════════════════
function initControls() {
    // Zoom
    document.getElementById('btn-zoom-in').addEventListener('click',
        () => svgEl && svgEl.transition().duration(300).call(zoomBeh.scaleBy, 1.3));
    document.getElementById('btn-zoom-out').addEventListener('click',
        () => svgEl && svgEl.transition().duration(300).call(zoomBeh.scaleBy, 0.77));
    document.getElementById('btn-zoom-fit').addEventListener('click', fitToScreen);

    // Slider Y — espaçamento entre nós irmãos
    const sY = document.getElementById('slider-y');
    const vY = document.getElementById('val-y');
    sY.addEventListener('input', () => {
        layout.spacingY = +sY.value;
        vY.textContent  = sY.value;
        recalcLayout();
    });

    // Slider X — distância entre níveis
    const sX = document.getElementById('slider-x');
    const vX = document.getElementById('val-x');
    sX.addEventListener('input', () => {
        layout.spacingX = +sX.value;
        vX.textContent  = sX.value;
        if (doUpdate && rootNode) doUpdate(rootNode); // só redesenha (X não muda altura)
    });

    // Busca
    const box = document.getElementById('search-box');
    box.addEventListener('input', () => applySearch(box.value.trim()));
    document.getElementById('btn-clear-search').addEventListener('click', () => {
        box.value = '';
        applySearch('');
    });

    // Expandir / Colapsar tudo
    document.getElementById('btn-expand').addEventListener('click', () => {
        if (!rootNode || !doUpdate) return;
        rootNode.descendants().forEach(d => {
            if (d._children) { d.children = d._children; d._children = null; }
        });
        doUpdate(rootNode);
    });
    document.getElementById('btn-collapse').addEventListener('click', () => {
        if (!rootNode || !doUpdate) return;
        rootNode.descendants().forEach(d => {
            if (d.depth > 0 && d.children) { d._children = d.children; d.children = null; }
        });
        doUpdate(rootNode);
    });

    // Filtro de direção
    document.getElementById('direcao-select').addEventListener('change', () => {
        state.direcao = document.getElementById('direcao-select').value || null;
        if (state.pergunta) loadData();
    });
}

// Recalcula a altura do SVG quando spacingY muda e dispara update
function recalcLayout() {
    if (!rootNode || !doUpdate || !currentTreemap || !svgEl) return;
    const leaves = rootNode.descendants().filter(d => !d.children && !d._children).length;
    const newH   = Math.max(leaves * layout.spacingY, 400);
    currentTreemap.size([newH, 9999]);
    svgEl.attr('height', newH + MARGIN.top + MARGIN.bottom);
    doUpdate(rootNode);
}

// Busca visual
function applySearch(q) {
    if (!q) {
        d3.selectAll('.node').classed('highlighted', false).classed('dimmed', false);
        return;
    }
    const ql = q.toLowerCase();
    d3.selectAll('.node')
        .classed('highlighted', d => d.data.name.toLowerCase().includes(ql))
        .classed('dimmed',      d => !d.data.name.toLowerCase().includes(ql));
}

function fitToScreen() {
    if (!svgEl || !gTree) return;
    const c   = document.getElementById('svg-container');
    const box = gTree.node().getBBox();
    const sc  = Math.min(c.clientWidth / (box.width + 80), c.clientHeight / (box.height + 80), 1.5) * 0.9;
    const tx  = (c.clientWidth  - box.width  * sc) / 2 - box.x * sc + MARGIN.left;
    const ty  = (c.clientHeight - box.height * sc) / 2 - box.y * sc + MARGIN.top;
    svgEl.transition().duration(500)
        .call(zoomBeh.transform, d3.zoomIdentity.translate(tx, ty).scale(sc));
}

// ════════════════════════════════════════════════════════════════
// FETCH
// ════════════════════════════════════════════════════════════════
async function get(endpoint, params = {}) {
    const url = new URL(endpoint, window.location.origin);
    Object.entries(params).forEach(([k,v]) => { if (v != null) url.searchParams.set(k, v); });
    const r = await fetch(url);
    if (!r.ok) throw new Error(`API ${r.status}`);
    return r.json();
}

// ════════════════════════════════════════════════════════════════
// STATE & FILTROS
// ════════════════════════════════════════════════════════════════
const state = { onda: null, assunto: null, pergunta: null, direcao: null };

async function init() {
    initTheme();
    initControls();

    try {
        const ondas = await get(`${API}/ondas`);
        const sel = document.getElementById('onda-select');
        sel.innerHTML = '<option value="">Selecione a onda</option>';
        ondas.forEach(o => {
            const opt = document.createElement('option');
            opt.value = o.codigo;
            opt.textContent = `${o.codigo}  (${(o.total_registros||0).toLocaleString()} reg.)`;
            sel.appendChild(opt);
        });
        sel.addEventListener('change', async e => {
            state.onda = e.target.value;
            if (!state.onda) return;
            const f = await get(`${API}/filtros`, { onda: state.onda });
            buildAssuntoSelect(f);
        });
    } catch(e) {
        document.getElementById('contexto').textContent = 'Erro ao conectar com a API.';
        console.error(e);
    }
}

// Reconstrói o select de assunto sem acumular listeners (replaceWith)
function buildAssuntoSelect(filtros) {
    let sel = document.getElementById('assunto-select');
    sel.innerHTML = '<option value="">Selecione o assunto</option>';
    filtros.assuntos.forEach(a => {
        const o = document.createElement('option');
        o.value = a; o.textContent = a; sel.appendChild(o);
    });
    sel.disabled = false;

    const clone = sel.cloneNode(true);
    sel.parentNode.replaceChild(clone, sel);
    clone.dataset.perguntas = JSON.stringify(filtros.perguntas);
    clone.addEventListener('change', e => {
        state.assunto = e.target.value;
        if (!state.assunto) return;
        buildPerguntaSelect(JSON.parse(e.target.dataset.perguntas)[state.assunto] || []);
    });
}

function buildPerguntaSelect(lista) {
    let sel = document.getElementById('pergunta-select');
    sel.innerHTML = '<option value="">Selecione a pergunta</option>';
    lista.forEach(p => {
        const o = document.createElement('option');
        o.value = p; o.textContent = p; sel.appendChild(o);
    });
    sel.disabled = false;

    const clone = sel.cloneNode(true);
    sel.parentNode.replaceChild(clone, sel);
    clone.addEventListener('change', e => {
        state.pergunta = e.target.value;
        if (!state.pergunta) return;
        state.direcao = document.getElementById('direcao-select').value || null;
        loadData();
    });
}

// ════════════════════════════════════════════════════════════════
// CARREGAR DADOS
// ════════════════════════════════════════════════════════════════
async function loadData() {
    const p = { onda: state.onda, assunto: state.assunto, pergunta: state.pergunta, direcao: state.direcao };
    try {
        const [tree, met] = await Promise.all([
            get(`${API}/tree`,     p),
            get(`${API}/metricas`, p),
        ]);
        document.getElementById('contexto').innerHTML =
            `<strong>${tree.contexto.assunto_coluna}</strong> → ` +
            `<strong>${tree.contexto.pergunta_coluna}</strong>` +
            (state.direcao ? `  |  <strong>${state.direcao}</strong>` : '');

        document.getElementById('met-total').textContent   = met.total_cruzamentos.toLocaleString();
        document.getElementById('met-drivers').textContent = met.total_drivers.toLocaleString();
        document.getElementById('met-anti').textContent    = met.total_anti_drivers.toLocaleString();
        document.getElementById('met-score').textContent   = met.top_score.toFixed(1);

        renderTree(tree.tree);
    } catch(e) {
        console.error(e);
        document.getElementById('svg-container').innerHTML =
            '<div class="viz-placeholder">Erro ao carregar dados. Veja o console.</div>';
    }
}

// ════════════════════════════════════════════════════════════════
// D3 COLLAPSIBLE TREE
// Nenhum controle externo é registrado aqui.
// Expõe doUpdate e rootNode globalmente para que os controles
// registrados em initControls() possam redesenhar.
// ════════════════════════════════════════════════════════════════
function renderTree(data) {
    const container = document.getElementById('svg-container');
    container.innerHTML = '';
    nodeIdSeq = 0;

    const countLeaves = n =>
        (!n.children?.length) ? 1 : n.children.reduce((s,c) => s + countLeaves(c), 0);

    const H = Math.max(countLeaves(data) * layout.spacingY, 400);

    const treemap = d3.tree().size([H, 9999]);
    currentTreemap = treemap;

    const svg = d3.select(container).append('svg')
        .attr('width',  '100%')
        .attr('height', H + MARGIN.top + MARGIN.bottom);
    svgEl = svg;

    const g = svg.append('g').attr('transform', `translate(${MARGIN.left},${MARGIN.top})`);
    gTree = g;

    zoomBeh = d3.zoom()
        .scaleExtent([0.05, 6])
        .on('zoom', ev => {
            g.attr('transform', ev.transform);
            document.getElementById('zoom-pct').textContent =
                `${Math.round(ev.transform.k * 100)}%`;
        });
    svg.call(zoomBeh);
    svg.on('wheel.zoom', null); // roda = scroll, não zoom

    rootNode = d3.hierarchy(data, d => d.children);
    rootNode.x0 = H / 2;
    rootNode.y0 = 0;

    // Colapsar tudo abaixo do nível 1
    if (rootNode.children) {
        rootNode.children.forEach(c => { if (c.children) c.children.forEach(collapseNode); });
    }

    // ── update exposta globalmente ──────────────────────────────
    doUpdate = function update(source) {
        const tl    = treemap(rootNode);
        const nodes = tl.descendants();
        const links = tl.descendants().slice(1);

        // Aplica spacingX: posição horizontal = profundidade × spacingX
        nodes.forEach(d => { d.y = d.depth * layout.spacingX; });

        // ── NÓS ───────────────────────────────────────────────
        const node = g.selectAll('g.node')
            .data(nodes, d => d.id || (d.id = ++nodeIdSeq));

        const enter = node.enter().append('g')
            .attr('class', 'node')
            .attr('transform', `translate(${source.y0 ?? 0},${source.x0 ?? 0})`)
            .on('click', (_, d) => {
                if (d.children)  { d._children = d.children;  d.children  = null; }
                else              { d.children  = d._children; d._children = null; }
                doUpdate(d);
            })
            .on('mousemove',  (ev, d) => showTip(ev, d))
            .on('mouseleave', hideTip);

        enter.append('circle').attr('r', 1e-6);
        enter.each(function(d) { buildLabel(d3.select(this), d); });

        const merged = enter.merge(node);
        merged.transition().duration(DURATION)
            .attr('transform', d => `translate(${d.y},${d.x})`);
        merged.select('circle')
            .attr('r', d => d.data.leaf ? 5 : 8)
            .style('fill',   d => nodeColor(d))
            .style('stroke', d => d.data.leaf
                ? scoreColor(d.data.metrics?.categoria_direcao)
                : cssVar('--node-stroke'));
        merged.selectAll('text').style('fill', cssVar('--text-secondary'));

        node.exit().transition().duration(DURATION)
            .attr('transform', `translate(${source.y},${source.x})`).remove();

        // ── LINKS ─────────────────────────────────────────────
        const link = g.selectAll('path.link').data(links, d => d.id);
        const lEnter = link.enter().insert('path','g')
            .attr('class','link')
            .attr('d', () => { const o={x:source.x0??0,y:source.y0??0}; return bez(o,o); });

        lEnter.merge(link).transition().duration(DURATION)
            .attr('d', d => bez(d, d.parent))
            .style('stroke',       d => linkColor(d))
            .style('stroke-width', d => linkWidth(d));

        link.exit().transition().duration(DURATION)
            .attr('d', () => { const o={x:source.x,y:source.y}; return bez(o,o); }).remove();

        nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
    };

    doUpdate(rootNode);
}

// ════════════════════════════════════════════════════════════════
// HELPERS D3
// ════════════════════════════════════════════════════════════════
function collapseNode(d) {
    if (d.children) {
        d._children = d.children;
        d._children.forEach(collapseNode);
        d.children = null;
    }
}

function bez(s, d) {
    const mx = (s.y + d.y) / 2;
    return `M${s.y},${s.x} C${mx},${s.x} ${mx},${d.x} ${d.y},${d.x}`;
}

function buildLabel(sel, d) {
    const isParent = !!(d.children || d._children);
    const xOff     = isParent ? -13 : 13;
    const anchor   = isParent ? 'end' : 'start';
    const lines    = wrapText(d.data.name || '', 36);
    const midLine  = (lines.length - 1) / 2;
    const tg = sel.append('g').attr('class','label-g');

    lines.forEach((ln, i) => {
        tg.append('text')
            .attr('x', xOff)
            .attr('dy', `${(i - midLine) * 1.25}em`)
            .attr('text-anchor', anchor)
            .style('fill', cssVar('--text-secondary'))
            .text(ln);
    });

    if (d.data.leaf && d.data.metrics?.score_nexas != null) {
        tg.append('text')
            .attr('x', xOff)
            .attr('dy', `${(lines.length / 2 + 0.55) * 1.25}em`)
            .attr('text-anchor', anchor)
            .style('fill', scoreColor(d.data.metrics.categoria_direcao))
            .style('font-size', '10px')
            .style('font-weight', '700')
            .text(`Score ${d.data.metrics.score_nexas.toFixed(1)}`);
    }
}

function wrapText(text, max) {
    if (text.length <= max) return [text];
    const words = text.split(' ');
    const lines = []; let cur = '';
    for (const w of words) {
        const c = cur ? `${cur} ${w}` : w;
        if (c.length <= max) { cur = c; }
        else { if (cur) lines.push(cur); cur = w; }
    }
    if (cur) lines.push(cur);
    return lines.length ? lines : [text.slice(0, max) + '…'];
}

function nodeColor(d) {
    if (d._children)  return cssVar('--node-collapsed');
    if (d.data.leaf)  return leafColor(d.data.metrics?.categoria_direcao);
    return cssVar('--node-internal');
}
function leafColor(dir) {
    if (!dir) return cssVar('--baixa');
    if (dir.includes('FORTE'))     return cssVar('--driver-forte');
    if (dir.includes('RELEVANTE')) return cssVar('--driver-rel');
    if (dir.includes('MODERADO'))  return cssVar('--driver-mod');
    if (dir.includes('ANTI'))      return cssVar('--anti-driver');
    return cssVar('--baixa');
}
function scoreColor(dir) { return leafColor(dir); }
function linkColor(d) {
    if (!d.data.leaf) return cssVar('--link-default');
    const dir = d.data.metrics?.categoria_direcao || '';
    if (dir.includes('FORTE'))     return cssVar('--driver-forte');
    if (dir.includes('RELEVANTE')) return cssVar('--driver-rel');
    return cssVar('--link-default');
}
function linkWidth(d) {
    if (!d.data.leaf || !d.data.metrics?.score_nexas) return 1.5;
    return Math.min(Math.max(Math.abs(d.data.metrics.score_nexas) / 250, 1), 5);
}

// ════════════════════════════════════════════════════════════════
// TOOLTIP
// ════════════════════════════════════════════════════════════════
const tipEl = document.getElementById('tooltip');
function showTip(ev, d) {
    const m = d.data.metrics;
    if (!m) return;
    let h = `<div class="t-title">${d.data.name}</div>`;
    if (d.data.leaf) {
        h += `<div class="t-row">Score Nexas: <em>${m.score_nexas.toFixed(2)}</em></div>`;
        h += `<div class="t-row">Lift: <em>${m.lift.toFixed(3)}</em></div>`;
        h += `<div class="t-row">Relevância: <em>${(m.relevancia*100).toFixed(1)}%</em></div>`;
        h += `<div class="t-row">Direção: <em style="color:${scoreColor(m.categoria_direcao)}">${m.categoria_direcao}</em></div>`;
        if (m.base_comum) h += `<div class="t-row">Base: <em>${m.base_comum}</em></div>`;
    } else {
        h += `<div class="t-row">Score médio: <em>${m.avg_score.toFixed(2)}</em></div>`;
        h += `<div class="t-row">Relevância média: <em>${(m.avg_relevancia*100).toFixed(1)}%</em></div>`;
        h += `<div class="t-row">Associações: <em>${m.count}</em></div>`;
        h += `<div class="t-hint">Clique para expandir / colapsar</div>`;
    }
    tipEl.innerHTML = h;
    tipEl.style.opacity = '1';
    tipEl.style.left = `${ev.clientX + 16}px`;
    tipEl.style.top  = `${ev.clientY - 10}px`;
}
function hideTip() { tipEl.style.opacity = '0'; }

// ════════════════════════════════════════════════════════════════
init();
</script>
</body>
</html>
